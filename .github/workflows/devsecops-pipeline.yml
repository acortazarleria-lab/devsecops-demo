name: DevSecOps Pipeline (SAST + DAST + Docker Security + Multi-arch)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # ==================== SAST - CodeQL ====================
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # ==================== Docker Build & Push Multi-arch ====================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/devsecops-demo:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

 # ==================== DAST - OWASP ZAP ====================
      - name: Run application container
        run: |
          docker run -d --name app -p 3000:3000 \
            ghcr.io/${{ github.repository_owner }}/devsecops-demo:latest

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001 > /dev/null; then
              echo "App lista"; exit 0
            fi
            echo "Esperando a la app... ($i)"; sleep 2
          done
          echo "La app no respondió a tiempo"; docker logs app; exit 1

      - name: DAST scan with OWASP ZAP
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:3000'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-dast-report
